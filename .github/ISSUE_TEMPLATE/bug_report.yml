name: 🐛 Bug Report
description: Create a report to help us reproduce and fix an issue in otcat
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report an issue in `otcat`! Please fill out the form below to help us diagnose and fix the problem quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: e.g., otcat panics when reading 125 holding registers with float32 byte swap options enabled.
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact otcat Command Used
      description: Provide the exact CLI command you executed.
      placeholder: otcat --modbus 192.168.1.10:502 --read holding:40001 --count 10 --json
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Output
      description: Output, stderr logs, error messages, or terminal backtraces.
    validations:
      required: true

  - type: input
    id: otcat-version
    attributes:
      label: otcat Version
      description: Run `otcat --version` or specify commit hash/release tag.
      placeholder: v0.1.0 or main@abc1234
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Target Controller / Protocol
      description: What device or simulator were you communicating with?
      options:
        - Modbus TCP (Physical PLC - Schneider / Siemens / AutomationDirect / etc.)
        - Modbus TCP Simulator (diagslave / Modbus Pal / Go mock)
        - EtherNet/IP (Allen-Bradley / CompactLogix)
        - S7comm (Siemens S7-1200 / S7-1500)
        - BACnet/IP
        - Other / Custom Gateway
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System & Architecture
      placeholder: e.g. Ubuntu 22.04 LTS (x86_64), macOS Sonoma (arm64), Windows 11 (x64)
    validations:
      required: true
