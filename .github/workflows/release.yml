name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: run test suite before releasing anything
        run: go test ./... -race -count=1

      - name: Clean up existing GitHub release asset lock if present
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false || true

      - name: GoReleaser (build, archive, nfpm package, GitHub release)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GoReleaser's native Cloudsmith publisher is a GoReleaser Pro
      # feature; this project uses the free-tier path instead: push the
      # .deb/.rpm/.apk files nfpm already built straight to Cloudsmith
      # with Cloudsmith's own CLI. See docs/releasing.md for the full
      # explanation and the one-time setup (org/repo names, API token).
      - name: push Linux packages to Cloudsmith
        if: ${{ env.CLOUDSMITH_API_KEY != '' }}
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          pip install --quiet cloudsmith-cli
          ORG="quitoperation"      # <- confirm this matches your actual Cloudsmith namespace
          REPO="otcat"
          for f in dist/*_amd64.deb dist/*_arm64.deb; do
            if [ -e "$f" ]; then
              cloudsmith push deb "$ORG/$REPO/debian/any-version" "$f" --republish || true
              cloudsmith push deb "$ORG/$REPO/ubuntu/any-version" "$f" --republish || true
            fi
          done
          for f in dist/*.x86_64.rpm dist/*.aarch64.rpm; do
            [ -e "$f" ] && cloudsmith push rpm "$ORG/$REPO/el/9" "$f" --republish
          done
          for f in dist/*.apk; do
            [ -e "$f" ] && cloudsmith push alpine "$ORG/$REPO/alpine/v3.20" "$f" --republish
          done

      - name: Generate APT, DNF (RPM), and Alpine (APK) repositories for GitHub Pages
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev createrepo-c
          mkdir -p gh-pages-repo/debian/amd64 gh-pages-repo/debian/arm64 gh-pages-repo/rpm gh-pages-repo/alpine/x86_64 gh-pages-repo/alpine/aarch64

          # 1a. APT Repository for amd64
          cp dist/*_amd64.deb gh-pages-repo/debian/amd64/
          (
            cd gh-pages-repo/debian/amd64
            dpkg-scanpackages . /dev/null > Packages
            gzip -9 -k -f Packages
            DATE=$(date -u -R)
            echo "Origin: QuitOperation" > Release
            echo "Label: otcat" >> Release
            echo "Suite: stable" >> Release
            echo "Codename: stable" >> Release
            echo "Date: $DATE" >> Release
            echo "Architectures: amd64" >> Release
            echo "Components: main" >> Release
            echo "Description: otcat APT repository (amd64)" >> Release
            echo "SHA256:" >> Release
            P_HASH=$(sha256sum Packages | cut -d' ' -f1)
            P_SIZE=$(stat -c%s Packages)
            GZ_HASH=$(sha256sum Packages.gz | cut -d' ' -f1)
            GZ_SIZE=$(stat -c%s Packages.gz)
            echo " $P_HASH $P_SIZE Packages" >> Release
            echo " $GZ_HASH $GZ_SIZE Packages.gz" >> Release
          )

          # 1b. APT Repository for arm64
          cp dist/*_arm64.deb gh-pages-repo/debian/arm64/
          (
            cd gh-pages-repo/debian/arm64
            dpkg-scanpackages . /dev/null > Packages
            gzip -9 -k -f Packages
            DATE=$(date -u -R)
            echo "Origin: QuitOperation" > Release
            echo "Label: otcat" >> Release
            echo "Suite: stable" >> Release
            echo "Codename: stable" >> Release
            echo "Date: $DATE" >> Release
            echo "Architectures: arm64" >> Release
            echo "Components: main" >> Release
            echo "Description: otcat APT repository (arm64)" >> Release
            echo "SHA256:" >> Release
            P_HASH=$(sha256sum Packages | cut -d' ' -f1)
            P_SIZE=$(stat -c%s Packages)
            GZ_HASH=$(sha256sum Packages.gz | cut -d' ' -f1)
            GZ_SIZE=$(stat -c%s Packages.gz)
            echo " $P_HASH $P_SIZE Packages" >> Release
            echo " $GZ_HASH $GZ_SIZE Packages.gz" >> Release
          )

          # 1c. Root APT Repository (multi-arch fallback)
          cp dist/*.deb gh-pages-repo/
          (
            cd gh-pages-repo
            dpkg-scanpackages . /dev/null > Packages
            gzip -9 -k -f Packages
            DATE=$(date -u -R)
            echo "Origin: QuitOperation" > Release
            echo "Label: otcat" >> Release
            echo "Suite: stable" >> Release
            echo "Codename: stable" >> Release
            echo "Date: $DATE" >> Release
            echo "Architectures: amd64 arm64" >> Release
            echo "Components: main" >> Release
            echo "Description: otcat APT repository" >> Release
            echo "SHA256:" >> Release
            P_HASH=$(sha256sum Packages | cut -d' ' -f1)
            P_SIZE=$(stat -c%s Packages)
            GZ_HASH=$(sha256sum Packages.gz | cut -d' ' -f1)
            GZ_SIZE=$(stat -c%s Packages.gz)
            echo " $P_HASH $P_SIZE Packages" >> Release
            echo " $GZ_HASH $GZ_SIZE Packages.gz" >> Release
          )

          # 2. RPM Repository (Fedora/RHEL/CentOS - dnf)
          cp dist/*.rpm gh-pages-repo/rpm/
          createrepo_c gh-pages-repo/rpm

          # 3. APK Repository for Alpine (apk add)
          for f in dist/*_x86_64.apk; do [ -e "$f" ] && cp "$f" gh-pages-repo/alpine/x86_64/; done
          for f in dist/*_aarch64.apk; do [ -e "$f" ] && cp "$f" gh-pages-repo/alpine/aarch64/; done
          docker run --rm -v $(pwd)/gh-pages-repo/alpine/x86_64:/repo alpine:3.20 sh -c "cd /repo && apk index -o APKINDEX.tar.gz --allow-untrusted *.apk"
          docker run --rm -v $(pwd)/gh-pages-repo/alpine/aarch64:/repo alpine:3.20 sh -c "cd /repo && apk index -o APKINDEX.tar.gz --allow-untrusted *.apk"
          mkdir -p gh-pages-repo/alpine/x86_64/x86_64 gh-pages-repo/alpine/aarch64/aarch64
          cp gh-pages-repo/alpine/x86_64/* gh-pages-repo/alpine/x86_64/x86_64/ || true
          cp gh-pages-repo/alpine/aarch64/* gh-pages-repo/alpine/aarch64/aarch64/ || true

      - name: Deploy Repositories to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-repo
          force_orphan: true
